{% case include.code %}
{% when "nb" %}
  <svg viewBox="0 0 22 16" aria-hidden="true" focusable="false">
    <rect width="22" height="16" fill="#BA0C2F"></rect>
    <rect x="6" width="4" height="16" fill="#FFFFFF"></rect>
    <rect y="6" width="22" height="4" fill="#FFFFFF"></rect>
    <rect x="7" width="2" height="16" fill="#00205B"></rect>
    <rect y="7" width="22" height="2" fill="#00205B"></rect>
  </svg>
{% when "nn" %}
  <svg viewBox="0 0 22 16" aria-hidden="true" focusable="false">
    <rect width="22" height="16" fill="#BA0C2F"></rect>
    <rect x="6" width="4" height="16" fill="#FFFFFF"></rect>
    <rect y="6" width="22" height="4" fill="#FFFFFF"></rect>
    <rect x="7" width="2" height="16" fill="#00205B"></rect>
    <rect y="7" width="22" height="2" fill="#00205B"></rect>
  </svg>
{% when "en" %}
  <svg viewBox="0 0 60 30" aria-hidden="true" focusable="false">
    <rect width="60" height="30" fill="#012169"></rect>
    <polygon points="0,0 7,0 60,23 60,30 53,30 0,7" fill="#FFFFFF"></polygon>
    <polygon points="60,0 53,0 0,23 0,30 7,30 60,7" fill="#FFFFFF"></polygon>
    <polygon points="0,0 4,0 60,26 60,30 56,30 0,4" fill="#C8102E"></polygon>
    <polygon points="60,0 56,0 0,26 0,30 4,30 60,4" fill="#C8102E"></polygon>
    <rect x="24" width="12" height="30" fill="#FFFFFF"></rect>
    <rect y="9" width="60" height="12" fill="#FFFFFF"></rect>
    <rect x="26" width="8" height="30" fill="#C8102E"></rect>
    <rect y="11" width="60" height="8" fill="#C8102E"></rect>
  </svg>
{% else %}
  <svg viewBox="0 0 18 12" aria-hidden="true" focusable="false">
    <rect width="18" height="12" fill="#65707D"></rect>
  </svg>
{% endcase %}
